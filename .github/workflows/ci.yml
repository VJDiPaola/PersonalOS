name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e .

      - name: Install test dependencies
        run: pip install pytest

      - name: Validate entities
        run: python -m cli.personalos.main validate

      - name: Generate all
        run: python -m cli.personalos.main generate all

      - name: Check for stale generated output
        run: git diff --exit-code views/ exports/
        shell: bash

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Run structural checks
        run: python -m cli.personalos.main check
